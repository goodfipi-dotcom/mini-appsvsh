<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VSH Service - Октябрьский</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --accent: #38bdf8;
            --main-bg: #020617;
            --glass-bg: rgba(15, 23, 42, 0.72);
            --text-color: #e5e7eb;
            --overlay: linear-gradient(rgba(2, 6, 23, 0.78), rgba(2, 6, 23, 0.9));
            --success: #10b981;
            --danger: #f87171;
            --admin-gold: #fbbf24;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif; 
            background-color: var(--main-bg);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-color); 
            margin: 0; padding: 0; min-height: 100vh;
            font-weight: 500;
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
        }

        .bg-main { background-image: var(--overlay), url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?q=80&w=2070&auto=format&fit=crop'); }
        .bg-customer { background-image: var(--overlay), url('https://images.unsplash.com/photo-1521737604893-d14cc237f11d?q=80&w=2084&auto=format&fit=crop'); }

        .container { padding: 20px; max-width: 500px; margin: 0 auto; }
        .card { 
            background: var(--glass-bg); 
            backdrop-filter: blur(20px);
            border: 1px solid rgba(148, 163, 184, 0.18);
            border-radius: 16px; padding: 20px; margin-bottom: 20px; 
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.55); 
        }

        .admin-card { border: 2px solid var(--admin-gold); background: rgba(251, 191, 36, 0.05); }

        h1, h2 { color: #f1f5f9; text-transform: uppercase; letter-spacing: 1px; margin: 0; text-align: center; }
        h1 { font-size: 24px; font-weight: 600; }
        h2 { font-size: 18px; margin-bottom: 15px; }

        .btn { 
            display: flex; align-items: center; justify-content: center; 
            background: rgba(255, 255, 255, 0.05);
            color: #e5e7eb; border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 16px; margin: 12px 0; border-radius: 14px; 
            width: 100%; font-weight: 600; font-size: 16px; cursor: pointer; 
            transition: all 0.15s ease;
        }
        .btn:active { transform: scale(0.98); background: rgba(255, 255, 255, 0.12); }
        .btn-accent { background: var(--accent); color: #020617; border: none; }
        .btn-admin { background: var(--admin-gold); color: #020617; border: none; }
        .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .input { 
            width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; 
            border: 1px solid rgba(148, 163, 184, 0.35); 
            background: rgba(15, 23, 42, 0.9); color: #e5e7eb; outline: none; box-sizing: border-box;
        }

        .hidden { display: none !important; }
        .back-link { color: var(--accent); cursor: pointer; display: block; margin-bottom: 15px; font-size: 14px; font-weight: bold; }

        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; text-align: center; padding: 10px; border-bottom: 2px solid transparent; cursor: pointer; opacity: 0.6; }
        .tab.active { border-color: var(--accent); opacity: 1; font-weight: bold; }
        
        .order-card { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 15px; margin-bottom: 10px; border-left: 4px solid var(--accent); }
        
        /* Стили для формы админа */
        .step-indicator { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .step-dot { width: 30%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; }
        .step-dot.active { background: var(--admin-gold); }
    </style>
</head>
<body class="bg-main">

    <div id="main-menu" class="container">
        <div class="card" style="margin-top: 60px; text-align:center;">
            <h1>VSH SERVICE</h1>
            <p style="opacity: 0.8; font-size: 14px;">Октябрьский — Сила в кадрах</p>
        </div>

        <div id="admin-panel" class="card admin-card hidden">
            <h2 style="color: var(--admin-gold);">👑 ПАНЕЛЬ ВЛАДЕЛЬЦА</h2>
            <button class="btn btn-admin" onclick="showPage('admin-publish')">📢 ОПУБЛИКОВАТЬ ЗАЯВКУ</button>
        </div>

        <button class="btn btn-accent" onclick="showPage('customer')">🙋‍♂️ ЗАКАЗАТЬ РАБОЧИХ</button>
        <button class="btn btn-outline" onclick="showPage('worker-auth')">🛠️ ВХОД ДЛЯ БРИГАД</button>
    </div>

    <div id="admin-publish" class="hidden container">
        <span class="back-link" onclick="showPage('main-menu')">← ОТМЕНА</span>
        <div class="card">
            <h2>Новая заявка</h2>
            <div class="step-indicator">
                <div class="step-dot active" id="dot-1"></div>
                <div class="step-dot" id="dot-2"></div>
                <div class="step-dot" id="dot-3"></div>
            </div>

            <div id="admin-step-1">
                <p>Что нужно сделать?</p>
                <textarea id="pub-task" class="input" rows="4" placeholder="Например: Разгрузка фуры с мебелью, 4 человека..."></textarea>
                <button class="btn btn-admin" onclick="adminNext(2)">ДАЛЕЕ</button>
            </div>

            <div id="admin-step-2" class="hidden">
                <p>Ставка для рабочих (руб/час):</p>
                <input type="number" id="pub-price" class="input" placeholder="350">
                <button class="btn btn-admin" onclick="adminNext(3)">ПОСЛЕДНИЙ ШАГ</button>
            </div>

            <div id="admin-step-3" class="hidden">
                <p>Адрес объекта:</p>
                <input type="text" id="pub-address" class="input" placeholder="ул. Ленина, д. 10">
                <button class="btn btn-admin" id="btn-final-publish" onclick="adminFinalPublish()">🚀 ВЫПУСТИТЬ ЗАЯВКУ</button>
            </div>
        </div>
    </div>

    <div id="customer" class="hidden container">
        <span class="back-link" onclick="showPage('main-menu')">← НА ГЛАВНУЮ</span>
        <div class="card">
            <h2>Заказать рабочих</h2>
            <input type="text" id="cust-name" class="input" placeholder="👤 Ваше имя">
            <input type="text" id="address" class="input" placeholder="📍 Адрес">
            <input type="text" id="task" class="input" placeholder="🔧 Что нужно сделать?">
            <input type="tel" id="phone" class="input" placeholder="📞 Номер телефона">
            <button class="btn btn-accent" id="btn-send-order" onclick="sendOrder()">ОТПРАВИТЬ ЗАЯВКУ</button>
        </div>
    </div>

    <div id="worker-auth" class="hidden container">
        <span class="back-link" onclick="showPage('main-menu')">← НАЗАД</span>
        <div class="card">
            <h2>Доступ бригад</h2>
            <input type="password" id="worker-pass" class="input" style="text-align:center; letter-spacing: 5px; font-size: 24px;" placeholder="****">
            <button class="btn btn-accent" id="btn-login" onclick="loginWorker()">ВОЙТИ</button>
        </div>
    </div>

    <div id="worker-cabinet" class="hidden container">
        <div class="tabs">
            <div class="tab active" id="tab-orders-link" onclick="switchTab('orders')">Заказы</div>
            <div class="tab" id="tab-profile-link" onclick="switchTab('profile')">Профиль</div>
        </div>
        <div id="tab-orders"><div id="available-orders-list"></div></div>
        <div id="tab-profile" class="hidden">
            <div class="card"><h2 id="worker-name"></h2><button class="btn" onclick="showPage('main-menu')" style="color: var(--danger);">ВЫЙТИ</button></div>
        </div>
    </div>

    <div id="modal-accept" class="hidden container">
        <span class="back-link" onclick="showPage('worker-cabinet')">← ОТМЕНА</span>
        <div class="card">
            <h2>Подтверждение</h2>
            <div id="order-details-preview"></div>
            <input type="text" id="confirm-text" class="input" placeholder="Напишите 'подтверждаю'">
            <button class="btn btn-accent" onclick="finalConfirm()">ПРИНЯТЬ ЗАКАЗ</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram?.WebApp || null;
        if (tg) { tg.ready(); tg.expand(); }

        const API_BASE = 'https://mini-appsvsh.vercel.app';
        const MY_ID = 7693616720; // ТВОЙ ID
        let currentWorker = null;
        let selectedOrder = null;

        // Проверка на владельца при загрузке
        window.onload = () => {
            const user = tg?.initDataUnsafe?.user;
            if (user && user.id === MY_ID) {
                document.getElementById('admin-panel').classList.remove('hidden');
            }
        };

        function showPage(id) {
            ['main-menu', 'customer', 'worker-auth', 'worker-cabinet', 'modal-accept', 'admin-publish'].forEach(p => {
                document.getElementById(p).classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
            document.body.className = (id === 'customer') ? 'bg-customer' : 'bg-main';
        }

        // Логика админ-формы
        function adminNext(step) {
            document.getElementById('admin-step-1').classList.add('hidden');
            document.getElementById('admin-step-2').classList.add('hidden');
            document.getElementById('admin-step-3').classList.add('hidden');
            document.getElementById('admin-step-' + step).classList.remove('hidden');
            
            document.getElementById('dot-1').classList.toggle('active', step >= 1);
            document.getElementById('dot-2').classList.toggle('active', step >= 2);
            document.getElementById('dot-3').classList.toggle('active', step >= 3);
        }

        async function adminFinalPublish() {
            const task = document.getElementById('pub-task').value;
            const price = document.getElementById('pub-price').value;
            const address = document.getElementById('pub-address').value;

            if (!task || !price || !address) return tg?.showAlert("Заполни все поля!");

            const btn = document.getElementById('btn-final-publish');
            btn.disabled = true;
            btn.textContent = "Публикация...";

            try {
                const res = await fetch(API_BASE + '/api/order', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        task: task,
                        worker_price: price,
                        address: address,
                        status: 'published', // Сразу делаем активным для рабочих
                        is_admin: true
                    })
                });

                if (res.ok) {
                    tg?.showAlert("✅ Заявка опубликована и видна рабочим!");
                    showPage('main-menu');
                    // Очистка полей
                    document.getElementById('pub-task').value = '';
                    document.getElementById('pub-price').value = '';
                    document.getElementById('pub-address').value = '';
                    adminNext(1);
                }
            } catch (e) {
                tg?.showAlert("Ошибка связи с сервером");
            } finally {
                btn.disabled = false;
                btn.textContent = "🚀 ВЫПУСТИТЬ ЗАЯВКУ";
            }
        }

        // Логика рабочих
        async function loginWorker() {
            const pass = document.getElementById('worker-pass').value;
            if (pass === '2026') {
                currentWorker = { id: tg?.initDataUnsafe?.user?.id || 123, name: tg?.initDataUnsafe?.user?.first_name || "Бригадир" };
                document.getElementById('worker-name').textContent = currentWorker.name;
                showPage('worker-cabinet');
                loadOrders();
            } else {
                tg?.showAlert("Неверный код");
            }
        }

        async function loadOrders() {
            const list = document.getElementById('available-orders-list');
            list.innerHTML = 'Загрузка...';
            try {
                const res = await fetch(API_BASE + '/api/order?status=published');
                const data = await res.json();
                list.innerHTML = '';
                data.forEach(order => {
                    const div = document.createElement('div');
                    div.className = 'order-card';
                    div.innerHTML = `
                        <b>🔧 ${order.service || order.task}</b><br>
                        💰 Ставка: ${order.worker_price}₽/час<br>
                        <button class="btn btn-accent" onclick='openAcceptModal(${JSON.stringify(order)})'>ПРИНЯТЬ</button>
                    `;
                    list.appendChild(div);
                });
            } catch (e) { list.innerHTML = 'Нет заказов'; }
        }

        function openAcceptModal(order) {
            selectedOrder = order;
            document.getElementById('order-details-preview').innerHTML = `Задача: ${order.service || order.task}<br>Оплата: ${order.worker_price}₽/ч`;
            showPage('modal-accept');
        }

        async function finalConfirm() {
            if (document.getElementById('confirm-text').value.toLowerCase() !== 'подтверждаю') return;
            tg?.showAlert("✅ Вы приняли заказ! Адрес: " + selectedOrder.address);
            showPage('worker-cabinet');
        }

        async function sendOrder() {
            // Обычная заявка от клиента
            tg?.showAlert("Заявка отправлена диспетчеру!");
            showPage('main-menu');
        }

        function switchTab(tab) {
            document.getElementById('tab-orders').classList.toggle('hidden', tab !== 'orders');
            document.getElementById('tab-profile').classList.toggle('hidden', tab !== 'profile');
        }
    </script>
</body>
</html>
