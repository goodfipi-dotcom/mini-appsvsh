<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VSH Service - Октябрьский</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --accent: #38bdf8;
            --main-bg: #020617;
            --glass-bg: rgba(15, 23, 42, 0.72);
            --text-color: #e5e7eb;
            --overlay: linear-gradient(rgba(2, 6, 23, 0.78), rgba(2, 6, 23, 0.9));
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif; 
            background-color: var(--main-bg);
            background-image: var(--overlay), url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?q=80&w=2070&auto=format&fit=crop');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: var(--text-color); margin: 0; padding: 0; min-height: 100vh;
        }

        .container { padding: 20px; max-width: 500px; margin: 0 auto; }
        
        .card { 
            background: var(--glass-bg); backdrop-filter: blur(20px);
            border: 1px solid rgba(148, 163, 184, 0.18);
            border-radius: 16px; padding: 20px; margin-bottom: 20px; 
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.55); 
        }

        .btn { 
            display: flex; align-items: center; justify-content: center; 
            background: rgba(255, 255, 255, 0.05); color: #e5e7eb; 
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 16px; margin: 12px 0; border-radius: 14px; 
            width: 100%; font-weight: 600; cursor: pointer; transition: 0.15s;
        }

        .btn-accent { background: var(--accent); color: #020617; border: none; }
        .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); }

        .input { 
            width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; 
            border: 1px solid rgba(148, 163, 184, 0.35); 
            background: rgba(15, 23, 42, 0.9); color: #e5e7eb; outline: none; box-sizing: border-box;
        }

        .hidden { display: none !important; }
        .back-link { color: var(--accent); cursor: pointer; display: block; margin-bottom: 15px; font-weight: bold; }
        
        .order-card { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 15px; margin-bottom: 15px; border-left: 4px solid var(--accent); }
        .admin-label { color: #f59e0b; font-size: 12px; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="main-menu" class="container">
        <div class="card" style="margin-top: 40px; text-align:center;">
            <h1>VSH SERVICE</h1>
            <p style="opacity: 0.8;">Цифровая платформа управления кадрами</p>
        </div>

        <div id="admin-action" class="hidden">
            <button class="btn btn-accent" onclick="showPage('admin-panel')">📢 ОПУБЛИКОВАТЬ ЗАЯВКУ</button>
        </div>

        <button class="btn btn-outline" onclick="showPage('orders-view')">📋 СПИСОК ЗАКАЗОВ</button>
        <button class="btn" onclick="showPage('worker-auth')">🛠️ ВХОД ДЛЯ БРИГАД</button>
    </div>

    <div id="admin-panel" class="hidden container">
        <span class="back-link" onclick="showPage('main-menu')">← НАЗАД</span>
        <div class="card">
            <div class="admin-label">Панель владельца</div>
            <h2>Новая заявка</h2>
            <textarea id="task-input" class="input" rows="5" placeholder="Введите детали заказа..."></textarea>
            <button class="btn btn-accent" onclick="sendOrder()">ОПУБЛИКОВАТЬ</button>
        </div>
    </div>

    <div id="orders-view" class="hidden container">
        <span class="back-link" onclick="showPage('main-menu')">← НАЗАД</span>
        <h2 style="text-align:center;">Актуальные заказы</h2>
        <div id="list-container">Загрузка...</div>
    </div>

    <div id="worker-auth" class="hidden container">
        <span class="back-link" onclick="showPage('main-menu')">← НАЗАД</span>
        <div class="card">
            <h2>Доступ бригад</h2>
            <input type="password" id="worker-pass" class="input" style="text-align:center;" placeholder="Введите ПИН-код">
            <button class="btn btn-accent" onclick="loginWorker()">ВОЙТИ</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const API_BASE = 'https://mini-appsvsh.vercel.app';
        const OWNER_ID = 42902;

        window.onload = () => {
            tg.expand();
            // Проверка на владельца
            const user = tg.initDataUnsafe?.user;
            if (user && user.id === OWNER_ID) {
                document.getElementById('admin-action').classList.remove('hidden');
            }
        };

        function showPage(pageId) {
            ['main-menu', 'admin-panel', 'orders-view', 'worker-auth'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            document.getElementById(pageId).classList.remove('hidden');
            if (pageId === 'orders-view') loadOrders();
        }

        async function sendOrder() {
            const taskText = document.getElementById('task-input').value;
            if (!taskText) return alert("Введите текст заявки!");

            try {
                const res = await fetch(`${API_BASE}/api/order`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ task: taskText, status: 'published' })
                });
                if (res.ok) {
                    alert("Заявка успешно опубликована!");
                    document.getElementById('task-input').value = '';
                    showPage('main-menu');
                }
            } catch (e) { alert("Ошибка при отправке"); }
        }

        async function loadOrders() {
            const container = document.getElementById('list-container');
            container.innerHTML = "Загрузка...";
            try {
                const res = await fetch(`${API_BASE}/api/order?status=published`);
                const data = await res.json();
                container.innerHTML = data.length ? '' : 'Заказов пока нет';
                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'order-card';
                    div.innerHTML = `<div style="white-space:pre-wrap;">${item.task}</div>`;
                    container.appendChild(div);
                });
            } catch (e) { container.innerHTML = "Ошибка загрузки данных"; }
        }

        function loginWorker() {
            if (document.getElementById('worker-pass').value === '2026') {
                alert("Успешный вход!");
                showPage('orders-view');
            } else { alert("Неверный код"); }
        }
    </script>
</body>
</html>
